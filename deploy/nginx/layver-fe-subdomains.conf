# Copy this file to:
# /etc/nginx/sites-available/layver-fe-subdomains.conf
# Then symlink to /etc/nginx/sites-enabled/ and reload nginx.

upstream layver_admin_upstream {
    server 127.0.0.1:3001;
}

upstream layver_user_upstream {
    server 127.0.0.1:3002;
}

upstream layver_partner_upstream {
    server 127.0.0.1:3003;
}

# Root/public + auth app (`apps/web`)
upstream layver_public_upstream {
    server 127.0.0.1:3000;
}

# HTTPS: root/public + auth
server {
    listen 443 ssl http2;
    server_name layverhq.com www.layverhq.com;

    ssl_certificate /etc/letsencrypt/live/layverhq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/layverhq.com/privkey.pem;

    location / {
        proxy_pass http://layver_public_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS: admin
server {
    listen 443 ssl http2;
    server_name admin.layverhq.com;

    # Replace with your certificate paths.
    ssl_certificate /etc/letsencrypt/live/layverhq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/layverhq.com/privkey.pem;

    location / {
        proxy_pass http://layver_admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS: user app
server {
    listen 443 ssl http2;
    server_name app.layverhq.com;

    ssl_certificate /etc/letsencrypt/live/layverhq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/layverhq.com/privkey.pem;

    location / {
        proxy_pass http://layver_user_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS: partner app
server {
    listen 443 ssl http2;
    server_name partner.layverhq.com;

    ssl_certificate /etc/letsencrypt/live/layverhq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/layverhq.com/privkey.pem;

    location / {
        proxy_pass http://layver_partner_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP -> HTTPS redirects
server {
    listen 80;
    server_name layverhq.com www.layverhq.com admin.layverhq.com app.layverhq.com partner.layverhq.com;
    return 301 https://$host$request_uri;
}
